    <script>
      // Force unregister Service Workers and clear caches to ensure users get the new code immediately
      const CURRENT_VERSION = 'v2_no_admin_live';
      
      async function clearAllCachesAndSW() {
        try {
          // Unregister all service workers
          if ('serviceWorker' in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            for (let registration of registrations) {
              await registration.unregister();
              console.log('SW unregistered successfully');
            }
          }
          
          // Clear all caches
          if ('caches' in window) {
            const keys = await caches.keys();
            for (let key of keys) {
              await caches.delete(key);
              console.log('Cache cleared:', key);
            }
          }
          
          localStorage.setItem('app_version', CURRENT_VERSION);
          console.log('Caches cleared and version set to:', CURRENT_VERSION);
          
          // Force a reload from the server to get fresh assets
          window.location.reload(true);
        } catch (e) {
          console.error('Error in clearing cache/SW:', e);
        }
      }

      // Check if we need to force update
      const savedVersion = localStorage.getItem('app_version');
      if (savedVersion !== CURRENT_VERSION) {
        clearAllCachesAndSW();
      } else {
        // Keep checking and unregistering in the background just in case
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(registrations => {
            for (let registration of registrations) {
              registration.unregister();
            }
          });
        }
      }
    </script>
